<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firmware Parameter Catalog — Intel FSP · AMD AGESA · openSIL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e17;--bg-panel:#111827;--bg-card:#1a2234;--bg-card-hover:#1e2a40;
  --border:#2a3550;--text:#e2e8f0;--text-dim:#8892a8;--text-bright:#f1f5f9;
  --accent:#3b82f6;--accent-dim:#1e40af;--green:#22c55e;--amber:#f59e0b;
  --red:#ef4444;--purple:#a78bfa;--cyan:#22d3ee;--sidebar-w:300px;
  --amd:#ed1c24;--amd-dim:#7f1d1d;--intel:#0071c5;--intel-dim:#1e3a5f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh}
.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:margin-left .3s}
.sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text-bright);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.sidebar-header .subtitle{font-size:11px;color:var(--text-dim)}
.sidebar-header .total{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);margin-top:6px}

/* Vendor toggle */
.vendor-toggle{padding:10px 12px;border-bottom:1px solid var(--border)}
.vendor-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.vendor-btns{display:flex;gap:8px}
.vtoggle{flex:1;padding:7px 0;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-dim);font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.vtoggle:hover{color:var(--text)}
.vtoggle.active-intel{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.vtoggle.active-amd{border-color:var(--amd);background:var(--amd-dim);color:var(--amd)}

/* Vendor indicator bar */
.vendor-bar{height:3px;width:100%;transition:background .3s}
.vendor-bar.intel{background:var(--intel)}
.vendor-bar.amd{background:var(--amd)}
.vendor-bar.none{background:var(--border)}

.platform-select{padding:10px 12px;border-bottom:1px solid var(--border)}
.platform-select select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:12px;font-family:'DM Sans',system-ui;cursor:pointer;outline:none}
.platform-select select:focus{border-color:var(--accent)}
.platform-meta{font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.4}
.platform-meta .seg{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:4px}
.seg-Server{background:rgba(239,68,68,.15);color:var(--red)}
.seg-Client{background:rgba(59,130,246,.15);color:#60a5fa}
.seg-Embedded{background:rgba(245,158,11,.15);color:var(--amber)}
.seg-ClientLegacy{background:rgba(245,158,11,.15);color:var(--amber)}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-track{background:transparent}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-section{padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg-card);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.nav-item .count{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);padding:1px 6px;border-radius:3px;color:var(--text-dim)}
.nav-item.active .count{background:rgba(59,130,246,.2);color:var(--accent)}

/* AMD active state overrides */
body.vendor-amd .nav-item.active{background:var(--amd-dim);color:var(--amd)}
body.vendor-amd .nav-item.active .count{background:rgba(237,28,36,.2);color:var(--amd)}
body.vendor-amd .topbar-stats strong{color:var(--amd)}
body.vendor-amd .category-header .badge{background:var(--amd-dim);color:var(--amd)}
body.vendor-amd .param-card:hover{border-color:var(--amd)}
body.vendor-amd .toggle-btn:hover{border-color:var(--amd);color:var(--amd)}
body.vendor-amd .search-box input:focus{border-color:var(--amd)}
body.vendor-amd .platform-select select:focus{border-color:var(--amd)}

/* Intel active state (default, but explicit) */
body.vendor-intel .nav-item.active{background:var(--intel-dim);color:var(--intel)}
body.vendor-intel .nav-item.active .count{background:rgba(0,113,197,.2);color:var(--intel)}
body.vendor-intel .topbar-stats strong{color:var(--intel)}
body.vendor-intel .category-header .badge{background:var(--intel-dim);color:var(--intel)}
body.vendor-intel .param-card:hover{border-color:var(--intel)}
body.vendor-intel .toggle-btn:hover{border-color:var(--intel);color:var(--intel)}
body.vendor-intel .search-box input:focus{border-color:var(--intel)}
body.vendor-intel .platform-select select:focus{border-color:var(--intel)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-shrink:0}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.search-box{flex:1;max-width:480px;position:relative}
.search-box input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px 8px 36px;border-radius:6px;font-size:13px;font-family:'DM Sans',system-ui;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none}
.topbar-stats{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);white-space:nowrap}
.topbar-stats strong{color:var(--accent)}

.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.category-header{font-size:18px;font-weight:700;color:var(--text-bright);margin:20px 0 12px;display:flex;align-items:center;gap:10px}
.category-header:first-child{margin-top:0}
.category-header .badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:3px}

.param-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color .15s,background .15s;overflow:hidden}
.param-card:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.param-header{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px;cursor:pointer;gap:12px}
.param-title-area{flex:1;min-width:0}
.param-name{font-weight:700;font-size:13px;color:var(--text-bright);margin-bottom:1px}
.param-field{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple)}
.param-meta{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.param-type{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);color:var(--cyan);padding:2px 6px;border-radius:3px;white-space:nowrap}
.param-offset{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);white-space:nowrap}
.param-default-chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(34,197,94,.15);color:var(--green);padding:2px 6px;border-radius:3px;white-space:nowrap}
.expand-icon{color:var(--text-dim);font-size:11px;transition:transform .2s;flex-shrink:0;margin-top:3px}
.param-card.expanded .expand-icon{transform:rotate(90deg)}
.param-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.param-card.expanded .param-body{display:block;padding-top:10px}
.param-desc{font-size:12px;color:var(--text-dim);margin-bottom:8px;line-height:1.5}
.param-options{display:flex;flex-wrap:wrap;gap:5px}
.option-chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:2px 7px;border-radius:4px}
.option-chip.is-default{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}
.phase-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);margin-top:6px;opacity:.7}

@keyframes param-highlight {
  0%  {border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.4);background:var(--bg-card-hover)}
  60% {border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.2);background:var(--bg-card-hover)}
  100%{border-color:var(--border);box-shadow:none;background:var(--bg-card)}
}
.param-card.flash{animation:param-highlight 2s ease-out forwards}

.loading{text-align:center;padding:60px 20px;color:var(--text-dim)}
.loading .spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-results{text-align:center;padding:60px 20px;color:var(--text-dim)}
.no-results .big{font-size:48px;margin-bottom:12px}

.landing{padding:40px;max-width:960px}
.landing h2{font-size:24px;color:var(--text-bright);margin-bottom:8px}
.landing .lead{color:var(--text-dim);margin-bottom:28px;font-size:14px}
.vendor-section{margin-bottom:32px}
.vendor-title{font-size:18px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.vendor-title .vtag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:3px}
.vtag-intel{background:rgba(0,113,197,.15);color:var(--intel)}
.vtag-amd{background:rgba(237,28,36,.15);color:var(--amd)}
.vendor-subtitle{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.platform-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s}
.platform-tile:hover{background:var(--bg-card-hover);transform:translateY(-1px)}
.platform-tile.intel-tile:hover{border-color:var(--intel)}
.platform-tile.amd-tile:hover{border-color:var(--amd)}
.platform-tile .name{font-weight:700;font-size:14px;color:var(--text-bright);margin-bottom:3px}
.platform-tile .proc{font-size:11px;color:var(--text-dim);margin-bottom:8px}
.platform-tile .meta{display:flex;justify-content:space-between;align-items:center}
.platform-tile .param-count{font-family:'JetBrains Mono',monospace;font-size:12px}
.intel-tile .param-count{color:var(--intel)}
.amd-tile .param-count{color:var(--amd)}
.platform-tile .src-type{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);background:var(--bg);padding:1px 5px;border-radius:3px}

@media(max-width:768px){.sidebar{position:fixed;z-index:100;height:100vh}.content{padding:16px}.topbar{padding:10px 16px}.platform-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

    <div class="content" id="content"></div>
  </div>
</div>

/coreboot/coreboot/tree/master/src/vendorcode/amd/fsp/picasso","total_parameters":106,"categories":{"Memory Configuration":4,"Debug / Serial Configuration":6,"Power / Thermal Management":15,"Platform / Miscellaneous":37,"CPU / CCX Configuration":3,"Storage Configuration":5,"Security":1,"Audio Configuration":2,"Display / Graphics":8,"PCIe / NBIO Configuration":6,"USB Configuration":19},"vendor":"AMD"},{"platform":"renoir","pkg_name":"amd_fsp_renoir","processor":"AMD Ryzen 4000/5000 Mobile (Renoir/Lucienne/Zen 2)","segment":"Client","family":"17h","source_type":"AMD FSP","source":"https://github.com/coreboot/coreboot/tree/master/src/vendorcode/amd/fsp/renoir","total_parameters":75,"categories":{"Debug / Serial Configuration":5,"Memory Configuration":3,"PCIe / NBIO Configuration":6,"Display / Graphics":2,"CPU / CCX Configuration":2,"Power / Thermal Management":41,"Security":1,"Audio Configuration":4,"Storage Configuration":5,"USB Configuration":1,"Platform / Miscellaneous":5},"vendor":"AMD"},{"platform":"00670F00","pkg_name":"agesa_pi_00670F00","processor":"AMD Carrizo/Bristol Ridge (Family 15h Model 60h-6Fh)","segment":"Client (Legacy)","family":"15h","source_type":"AGESA PI","source":"https://github.com/coreboot/coreboot/tree/master/src/vendorcode/amd/pi/00670F00","total_parameters":620,"categories":{"Peripheral / IO":5,"Platform / Miscellaneous":294,"PCIe / NBIO Configuration":18,"Storage Configuration":7,"USB Configuration":4,"CPU / CCX Configuration":18,"Memory Configuration":167,"Display / Graphics":53,"Power / Thermal Management":29,"Audio Configuration":8,"Security":2,"FCH Configuration":13,"Debug / Serial Configuration":2},"vendor":"AMD"},{"platform":"00730F01","pkg_name":"agesa_pi_00730F01","processor":"AMD Stoney Ridge (Family 15h Model 70h-7Fh)","segment":"Client (Legacy)","family":"15h","source_type":"AGESA PI","source":"https://github.com/coreboot/coreboot/tree/master/src/vendorcode/amd/pi/00730F01","total_parameters":531,"categories":{"Peripheral / IO":2,"Platform / Miscellaneous":265,"PCIe / NBIO Configuration":18,"Storage Configuration":7,"USB Configuration":4,"CPU / CCX Configuration":12,"Memory Configuration":144,"Display / Graphics":20,"Power / Thermal Management":36,"Audio Configuration":6,"Security":2,"FCH Configuration":13,"Debug / Serial Configuration":2},"vendor":"AMD"},{"platform":"genoa_poc","pkg_name":"opensil_genoa_poc","processor":"AMD EPYC 9004 (Genoa/Zen 4) \u2014 PoC","segment":"Server","family":"19h","source_type":"openSIL","source":"https://github.com/coreboot/coreboot/tree/master/src/vendorcode/amd/opensil/genoa_poc","total_parameters":11,"categories":{"Platform / Miscellaneous":4,"PCIe / NBIO Configuration":6,"Peripheral / IO":1},"vendor":"AMD"},{"platform":"stub","pkg_name":"opensil_stub","processor":"stub","segment":"Server","family":"Unknown","source_type":"openSIL","source":"https://github.com/coreboot/coreboot/tree/master/src/vendorcode/amd/opensil/stub","total_parameters":10,"categories":{"Platform / Miscellaneous":3,"PCIe / NBIO Configuration":4,"Peripheral / IO":1,"Power / Thermal Management":2},"vendor":"AMD"},{"platform":"turin_poc","pkg_name":"opensil_turin_poc","processor":"AMD EPYC (Turin/Zen 5) \u2014 PoC","segment":"Server","family":"1Ah","source_type":"openSIL","source":"https://github.com/coreboot/coreboot/tree/master/src/vendorcode/amd/opensil/turin_poc","total_parameters":11,"categories":{"Platform / Miscellaneous":4,"PCIe / NBIO Configuration":6,"Peripheral / IO":1},"vendor":"AMD"}];

let currentPlatform  = null;
let platformData     = null;
let activeCategory   = 'all';
let searchQuery      = '';
let expandedCards    = new Set();
let selectedVendor   = null;   // 'Intel' | 'AMD' | null

// ── Vendor theming ───────────────────────────────────────────────────────────

function setVendorTheme(vendor) {
  // Blue is the default — only AMD overrides to red
  document.body.classList.remove('vendor-intel','vendor-amd');
  const bar = document.getElementById('vendorBar');
  bar.classList.remove('intel','amd','none');
  if (vendor === 'AMD') { document.body.classList.add('vendor-amd'); bar.classList.add('amd'); }
  else                  { bar.classList.add(vendor === 'Intel' ? 'intel' : 'none'); }
}

// ── Vendor toggle ─────────────────────────────────────────────────────────────

function selectVendor(v) {
  selectedVendor = (selectedVendor === v) ? null : v;
  setVendorTheme(selectedVendor);
  document.getElementById('btnIntel').className  = 'vtoggle' + (selectedVendor === 'Intel' ? ' active-intel' : '');
  document.getElementById('btnAMD').className    = 'vtoggle' + (selectedVendor === 'AMD'   ? ' active-amd'   : '');
  document.querySelector('.vendor-label').style.display = selectedVendor ? 'none' : '';
  // Reset platform if it doesn't belong to the new vendor
  if (currentPlatform && selectedVendor && currentPlatform.vendor !== selectedVendor) {
    currentPlatform = null; platformData = null;
  }
  rebuildPlatformSelect();
  showLanding();   // show filtered tiles for this vendor (or all if none selected)
}

// ── Badge ─────────────────────────────────────────────────────────────────────

function updateBadge() {
  const badge = document.getElementById('totalBadge');
  if (currentPlatform) {
    const v     = currentPlatform.vendor;
    const extra = v === 'Intel' ? `FSP ${currentPlatform.fsp_spec_version||''}` : (currentPlatform.source_type||'');
    const seg   = currentPlatform.segment || '';
    badge.innerHTML = `<span class="seg seg-${seg.replace(/[^a-zA-Z]/g,'')}" style="font-size:11px;padding:1px 6px">${seg}</span> ${extra} · ${currentPlatform.total_parameters.toLocaleString()} parameters`;
  } else if (selectedVendor) {
    const ps    = INDEX.filter(p => p.vendor === selectedVendor);
    const total = ps.reduce((s,p) => s + p.total_parameters, 0);
    badge.textContent = `${ps.length} platforms · ${total.toLocaleString()} parameters`;
  } else {
    const total = INDEX.reduce((s,p) => s + p.total_parameters, 0);
    badge.textContent = `${INDEX.length} platforms · ${total.toLocaleString()} parameters`;
  }
}

// ── Hash routing (same pattern as Claude Code's fix) ─────────────────────────

function setHash(hash, push) {
  const url = hash ? '#' + hash : location.pathname + location.search;
  if (push) history.pushState(null, '', url);
  else      history.replaceState(null, '', url);
}

function routeFromHash(push) {
  const raw = decodeURIComponent(location.hash.slice(1));
  if (!raw) { showLanding(); return; }
  const slash = raw.indexOf('/');
  const pkg   = slash === -1 ? raw       : raw.slice(0, slash);
  const field = slash === -1 ? null      : raw.slice(slash + 1);
  const match = INDEX.find(p => p.pkg_name === pkg || p.platform === pkg);
  if (match) loadPlatform(match.pkg_name, field, push);
  else       showLanding();
}

window.addEventListener('popstate', () => routeFromHash(false));

// ── Init ─────────────────────────────────────────────────────────────────────

function init() {
  rebuildPlatformSelect();
  setupEvents();
  routeFromHash(false);
}

// ── Landing ──────────────────────────────────────────────────────────────────

function showLanding() {
  setHash('', false);
  setVendorTheme(selectedVendor);
  currentPlatform = null; platformData = null;
  document.getElementById('platformSelect').value = '';
  document.getElementById('sidebarNav').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
  updateBadge();

  const showIntel = !selectedVendor || selectedVendor === 'Intel';
  const showAMD   = !selectedVendor || selectedVendor === 'AMD';
  const intel     = INDEX.filter(p => p.vendor === 'Intel');
  const amd       = INDEX.filter(p => p.vendor === 'AMD');

  let h = '<div class="landing">';
  h += '<div class="lead">Select a processor above to browse its firmware configuration parameters.</div>';

  if (showIntel) {
    const intelGroups = { Server:[], Client:[], Embedded:[] };
    for (const p of intel) (intelGroups[p.segment] || intelGroups.Client).push(p);
    h += '<div class="vendor-section">';
    if (!selectedVendor) h += '<div class="vendor-title"><span class="vtag vtag-intel">INTEL</span> Firmware Support Package (FSP)</div>';
    for (const [seg, platforms] of Object.entries(intelGroups)) {
      if (!platforms.length) continue;
      h += `<div style="font-size:13px;color:var(--text-dim);margin:12px 0 6px;font-weight:500">${seg}</div><div class="platform-grid">`;
      for (const p of platforms.sort((a,b) => b.total_parameters - a.total_parameters)) {
        h += `<div class="platform-tile intel-tile" onclick="loadPlatform('${p.pkg_name}',null,true)">
          <div class="name">${esc(p.platform)}</div><div class="proc">${esc(p.processor)}</div>
          <div class="meta"><span class="seg seg-${seg.replace(/[^a-zA-Z]/g,'')}">${seg}</span>
          <span class="param-count">${p.total_parameters.toLocaleString()}</span></div></div>`;
      }
      h += '</div>';
    }
    h += '</div>';
  }

  if (showAMD) {
    const amdGroups = {};
    for (const p of amd) { const k = p.source_type||'Other'; if (!amdGroups[k]) amdGroups[k] = []; amdGroups[k].push(p); }
    h += '<div class="vendor-section">';
    if (!selectedVendor) h += '<div class="vendor-title"><span class="vtag vtag-amd">AMD</span> AGESA · AMD FSP · openSIL</div>';
    for (const [src, platforms] of Object.entries(amdGroups)) {
      h += `<div style="font-size:13px;color:var(--text-dim);margin:12px 0 6px;font-weight:500">${esc(src)}</div><div class="platform-grid">`;
      for (const p of platforms.sort((a,b) => b.total_parameters - a.total_parameters)) {
        h += `<div class="platform-tile amd-tile" onclick="loadPlatform('${p.pkg_name}',null,true)">
          <div class="name">${esc(p.platform)}</div><div class="proc">${esc(p.processor)}</div>
          <div class="meta"><span class="src-type">${esc(p.source_type||'')}</span>
          <span class="param-count">${p.total_parameters.toLocaleString()}</span></div></div>`;
      }
      h += '</div>';
    }
    h += '</div>';
  }

  h += '</div>';

  document.getElementById('content').innerHTML = h;
}

// ── Platform view ────────────────────────────────────────────────────────────

async function loadPlatform(pkgName, scrollToField, push) {
  if (push === undefined) push = true;
  currentPlatform = INDEX.find(p => p.pkg_name === pkgName);
  if (!currentPlatform) return;

  setVendorTheme(currentPlatform.vendor);

  const hash = pkgName + (scrollToField ? '/' + scrollToField : '');
  setHash(hash, push);

  document.getElementById('platformSelect').value = pkgName;
  updateBadge();

  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><div>Loading parameters…</div></div>';

  try {
    const resp = await fetch(`data/${pkgName}.json`);
    platformData = await resp.json();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="no-results"><div class="big">⚠</div><div>Could not load platform data.</div></div>';
    return;
  }

  activeCategory = 'all'; searchQuery = ''; expandedCards.clear();
  document.getElementById('searchInput').value = '';

  if (scrollToField) {
    const target = platformData.parameters.find(p => p.field_name === scrollToField);
    if (target) expandedCards.add((target.offset||'') + target.field_name);
  }

  buildSidebar(); renderContent();

  if (scrollToField) {
    requestAnimationFrame(() => {
      const target = platformData.parameters.find(p => p.field_name === scrollToField);
      if (!target) return;
      const el = document.querySelector(`.param-card[data-id="${CSS.escape((target.offset||'') + target.field_name)}"]`);
      if (!el) return;
      el.scrollIntoView({ behavior:'smooth', block:'center' });
      el.classList.add('flash');
      el.addEventListener('animationend', () => el.classList.remove('flash'), { once:true });
    });
  }
}

// ── Sidebar ──────────────────────────────────────────────────────────────────

function rebuildPlatformSelect() {
  const sel = document.getElementById('platformSelect');
  sel.innerHTML = '<option value="">Select Processor...</option>';

  const show = selectedVendor ? INDEX.filter(p => p.vendor === selectedVendor) : INDEX;
  const intel = show.filter(p => p.vendor === 'Intel');
  const amd   = show.filter(p => p.vendor === 'AMD');

  if (intel.length) {
    const iGroups = { Server:[], Client:[], Embedded:[] };
    for (const p of intel) (iGroups[p.segment]||iGroups.Client).push(p);
    for (const [seg, platforms] of Object.entries(iGroups)) {
      if (!platforms.length) continue;
      const og = document.createElement('optgroup');
      og.label = selectedVendor ? seg : `Intel — ${seg}`;
      for (const p of platforms.sort((a,b) => a.processor.localeCompare(b.processor))) {
        const opt = document.createElement('option');
        opt.value = p.pkg_name;
        opt.textContent = `${p.processor} (${p.total_parameters})`;
        og.appendChild(opt);
      }
      sel.appendChild(og);
    }
  }

  if (amd.length) {
    const aGroups = {};
    for (const p of amd) { const k = p.source_type||'AMD'; if (!aGroups[k]) aGroups[k] = []; aGroups[k].push(p); }
    for (const [src, platforms] of Object.entries(aGroups)) {
      const og = document.createElement('optgroup');
      og.label = selectedVendor ? src : `AMD — ${src}`;
      for (const p of platforms.sort((a,b) => a.processor.localeCompare(b.processor))) {
        const opt = document.createElement('option');
        opt.value = p.pkg_name;
        opt.textContent = `${p.processor} (${p.total_parameters})`;
        og.appendChild(opt);
      }
      sel.appendChild(og);
    }
  }

  // Restore current selection if still in list, otherwise blank
  sel.value = currentPlatform ? currentPlatform.pkg_name : '';
}

function buildSidebar() {
  if (!currentPlatform) return;
  const cats = currentPlatform.categories;
  const sorted = Object.entries(cats).sort((a,b) => b[1] - a[1]);
  let html = '<div class="nav-section">';
  html += `<div class="nav-item active" data-cat="all"><span>All Parameters</span><span class="count">${currentPlatform.total_parameters}</span></div>`;
  for (const [cat, count] of sorted)
    html += `<div class="nav-item" data-cat="${esc(cat)}"><span>${esc(cat)}</span><span class="count">${count}</span></div>`;
  html += '</div>';
  document.getElementById('sidebarNav').innerHTML = html;
}

// ── Render ────────────────────────────────────────────────────────────────────

function getFilteredParams() {
  if (!platformData) return [];
  let params = platformData.parameters;
  if (activeCategory !== 'all') params = params.filter(p => p.category === activeCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    params = params.filter(p =>
      p.display_name.toLowerCase().includes(q) ||
      p.field_name.toLowerCase().includes(q) ||
      (p.description && p.description.toLowerCase().includes(q))
    );
  }
  return params;
}

function renderContent() {
  const content = document.getElementById('content');
  const params = getFilteredParams();
  if (!params.length) {
    content.innerHTML = '<div class="no-results"><div class="big">∅</div><div>No parameters match</div></div>';
    updateStats(); return;
  }
  const grouped = {};
  for (const p of params) { if (!grouped[p.category]) grouped[p.category] = []; grouped[p.category].push(p); }
  let html = '';
  for (const [cat, cp] of Object.entries(grouped).sort((a,b) => b[1].length - a[1].length)) {
    html += `<div class="category-header">${esc(cat)}<span class="badge">${cp.length}</span></div>`;
    for (const p of cp) {
      const id = (p.offset||'') + p.field_name;
      const exp = expandedCards.has(id);
      html += `<div class="param-card${exp?' expanded':''}" data-id="${esc(id)}">
        <div class="param-header" onclick="toggleCard(this.closest('.param-card'))">
          <div class="param-title-area">
            <div class="param-name">${esc(p.display_name)}</div>
            <div class="param-field">${esc(p.field_name)}</div>
          </div>
          <div class="param-meta">
            ${p.default?`<span class="param-default-chip">${esc(p.default)}</span>`:''}
            <span class="param-type">${esc(p.c_type)}${p.array_size?'['+p.array_size+']':''}</span>
            ${p.offset?`<span class="param-offset">${p.offset}</span>`:''}
            <span class="expand-icon">▶</span>
          </div>
        </div>
        <div class="param-body">
          <div class="param-desc">${esc(p.description)}</div>
          ${p.options&&p.options.length?renderOpts(p.options,p.default):''}
          <div class="phase-tag">${esc(p.phase||'')}${p.size_bytes?' · '+p.size_bytes+'B':''}</div>
        </div>
      </div>`;
    }
  }
  content.innerHTML = html;
  updateStats();
}

function renderOpts(opts, def) {
  let h = '<div class="param-options">';
  for (const o of opts) {
    const isDef = def && (o.label.toLowerCase().includes('default') || o.value === def);
    h += `<span class="option-chip${isDef?' is-default':''}">${esc(o.value)}: ${esc(o.label)}</span>`;
  }
  return h + '</div>';
}

function updateStats() {
  const el = document.getElementById('stats');
  if (!platformData) { el.innerHTML = ''; return; }
  el.innerHTML = `<strong>${getFilteredParams().length}</strong> / ${platformData.total_parameters}`;
}

// ── Card toggle ──────────────────────────────────────────────────────────────

function toggleCard(cardEl) {
  const id = cardEl.dataset.id;
  const isOpen = expandedCards.has(id);
  if (isOpen) {
    expandedCards.delete(id); cardEl.classList.remove('expanded');
    if (currentPlatform) setHash(currentPlatform.pkg_name, false);
  } else {
    expandedCards.add(id); cardEl.classList.add('expanded');
    if (platformData && currentPlatform) {
      const param = platformData.parameters.find(p => ((p.offset||'') + p.field_name) === id);
      if (param) setHash(currentPlatform.pkg_name + '/' + param.field_name, false);
    }
  }
}

// ── Events ───────────────────────────────────────────────────────────────────

function setupEvents() {
  document.getElementById('sidebarNav').addEventListener('click', e => {
    const item = e.target.closest('.nav-item'); if (!item) return;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    activeCategory = item.dataset.cat; expandedCards.clear();
    if (currentPlatform) setHash(currentPlatform.pkg_name, false);
    renderContent();
  });
  let debounce;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      searchQuery = e.target.value.trim(); expandedCards.clear();
      if (currentPlatform) setHash(currentPlatform.pkg_name, false);
      renderContent();
    }, 150);
  });
  document.getElementById('toggleBtn').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('collapsed'));
  document.getElementById('platformSelect').addEventListener('change', e => {
    if (e.target.value) loadPlatform(e.target.value, null, true);
    else showLanding();
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
